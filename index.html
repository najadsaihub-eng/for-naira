<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Naira 💖</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <div class="card">
      <h1>FOR NAIRA</h1>
      <p class="sub">A little message from Najad 💌</p>

      <div class="heart">💖</div>

      <p class="message">
        Some people don't want you,<br>
        but want your attention.<br><br>

        Some people don't care about you,<br>
        but wanna control you.
      </p>

      <button onclick="showLove()">Tap Me</button>
      <p id="output"></p>
    </div>

  </div>

  <script>
    function showLove() {
      document.getElementById("output").innerText = "Stay strong. Choose yourself always 💫";
    }
  </script>

</body>
</html>
