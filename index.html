<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Naira ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Welcome Screen -->
    <section id="welcome" class="screen">

        <div class="overlay">
            <h2>For Naira ❤️</h2>

            <h1>Someone has something special to ask you...</h1>

            <button id="startBtn">Start ❤️</button>
        </div>

    </section>

    <!-- Story Screen -->
    <section id="story" class="screen hidden">

        <div class="overlay">

            <h2>Hi Naira ❤️</h2>

            <p id="storyText">
                Every story begins with a single moment...<br><br>

                I never imagined someone could make my days brighter just by existing. 🤍<br><br>

                And today, I want to tell you something that comes straight from my heart.
            </p>

            <button id="nextBtn">Continue ➜</button>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
